<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TruthGuard Extension</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #020617; /* slate-950 */
      color: #f8fafc; /* slate-50 */
      width: 320px;
      margin: 0;
      padding: 0;
    }
    .container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .logo {
      margin-bottom: 16px;
      position: relative;
    }
    .logo svg {
      color: #22d3ee; /* cyan-400 */
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.4));
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8; /* slate-400 */
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    button {
      background: linear-gradient(135deg, rgba(99,102,241,0.98), rgba(34,211,238,0.92));
      color: #020617;
      border: none;
      border-radius: 9999px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px -6px rgba(34, 211, 238, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button svg {
      width: 16px;
      height: 16px;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container glass-panel" style="margin: 12px; width: calc(100% - 24px);">
    <div class="logo">
      <!-- Shield icon from lucide -->
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>
    <h1>TruthGuard</h1>
    <p>Scan this page for manipulation, bias, and factual credibility.</p>
    
    <button id="scan-page-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"></path>
        <path d="m15 5 4 4"></path>
      </svg>
      Fact Check Page
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
